[site]
name = "APTlantis"
domain = "https://aptlantis.net"
description = "APTlantis is a schema-driven, AI-augmented mirror and archive platform hosting Linux distros, crates snapshots, torrents, TempleOS artifacts, and datasets with rich metadata."
version = "1.0.0"
authors = ["Herb"]
urls = { homepage = "https://aptlantis.net", api = "https://aptlantis.net/api", repo = "" }
branding = { primary_color = "#00AEEF", secondary_color = "#111827", logo_svg = "/assets/logo/aptlantis.svg" }

[site.analytics]
last_updated = null
total_resources = 0
total_mirrors = 4
total_torrents = 0

[resources]
torrents = []
isos = []
snapshots = []
datasets = []
videos = []

[ui.components.mirror_card]
layout = "vertical"
fields = ["name", "description", "type", "http_url", "browse_url"]
badges = ["type"]
show_rsync = true

[ui.components.torrent_card]
layout = "compact"
fields = ["name", "infohash", "size", "seed_status"]
show_magnet = true

[ui.components.iso_card]
layout = "vertical"
fields = ["distro", "version", "arch", "size", "hashes"]
show_download = true

[ui.components.dataset_card]
layout = "vertical"
fields = ["name", "domain", "size", "license"]
show_schema_link = true

[ui.components.video_card]
layout = "horizontal"
fields = ["title", "duration", "topic", "templeos_module"]

[ui.components.footer]
text = "APTlantis — schema-driven mirror & archive."

[llm.instructions]
new_mirror = "You are helping maintain APTlantis, a schema-driven mirror platform. When adding a new mirror, you MUST output a JSON object conforming to the mirror schema with id, name, description, type, rsync_root, http_url, browse_url, rsync_endpoint, and enabled."
new_torrent = "Given a .torrent file and its analysis, output a JSON object conforming to torrent.meta.json, including infohash, trackers, file list, and any known upstream source."
new_iso = "Given an ISO file and hashes, output an iso-image.meta.json object: distro name, version, arch, size bytes, hash suite, and any upstream URLs."
new_dataset = "Describe datasets in dataset.json format with name, domain, size, license, source, and any related torrents or snapshots."
new_theme = "When generating a theme, you MUST output a theme object matching ui.themes items in site.json with id, name, description, and css_variables."
page_generation = "When asked to create or modify a page for APTlantis, use the ui.pages array structure: slug, title, description, template, and content_model. Never output HTML directly; only JSON."

[[mirrors]]
id = "parrotos"
name = "Parrot OS"
description = "Parrot OS mirror hosted on APTlantis."
type = "distro"
rsync_root = "A:/Mirrors/ParrotOS"
http_url = "https://aptlantis.net/distros/parrot"
browse_url = "https://aptlantis.net/filebrowser/parrot"
rsync_endpoint = "rsync://mirrors.aptlantis.net/parrotos"
enabled = true

[[mirrors]]
id = "antix-mx"
name = "antiX / MX Linux"
description = "antiX and MX Linux mirror hosted on APTlantis."
type = "distro"
rsync_root = "A:/Mirrors/antix-MX"
http_url = "https://aptlantis.net/distros/antix-mx"
browse_url = "https://aptlantis.net/filebrowser/antix-mx"
rsync_endpoint = "rsync://mirrors.aptlantis.net/antix-mx"
enabled = true

[[mirrors]]
id = "rust-crates"
name = "Rust Crates (crates.io snapshot)"
description = "Snapshot(s) of crates.io, mirrored and hashed via APTlantis."
type = "registry"
rsync_root = "A:/Mirrors/Rust-Crates"
http_url = "https://aptlantis.net/registries/rust-crates"
browse_url = "https://aptlantis.net/filebrowser/rust-crates"
rsync_endpoint = "rsync://mirrors.aptlantis.net/rust-crates"
enabled = true

[[mirrors]]
id = "torrents"
name = "Torrent Metadata & Payloads"
description = "Torrent metadata and payloads for mirrored ISOs and datasets."
type = "torrents"
rsync_root = "A:/Mirrors/Torrents"
http_url = "https://aptlantis.net/torrents"
browse_url = "https://aptlantis.net/filebrowser/torrents"
rsync_endpoint = "rsync://mirrors.aptlantis.net/torrents"
enabled = true

[[ui.themes]]
id = "aptlantis-dark"
name = "APTlantis Dark"
description = "Primary dark theme for APTlantis, tuned for terminal + code-heavy layouts."
css_variables.--bg = "#020617"
css_variables.--bg-alt = "#0b1120"
css_variables.--fg = "#e5e7eb"
css_variables.--accent = "#0ea5e9"
css_variables.--accent-soft = "#38bdf8"
css_variables.--border-subtle = "#1f2937"
css_variables.--card-bg = "#020617"
css_variables.--code-bg = "#020617"
css_variables.--link = "#38bdf8"

[[ui.components.navbar.entries]]
label = "Home"
href = "/"

[[ui.components.navbar.entries]]
label = "Distros"
href = "/distros"

[[ui.components.navbar.entries]]
label = "Torrents"
href = "/torrents"

[[ui.components.navbar.entries]]
label = "Crates"
href = "/registries/rust-crates"

[[ui.components.navbar.entries]]
label = "TempleOS"
href = "/templeos"

[[ui.components.footer.links]]
label = "GitHub"
href = ""

[[ui.components.footer.links]]
label = "Contact"
href = "/contact"

[[ui.pages]]
slug = ""
title = "APTlantis"
description = "APTlantis mirror and archive overview."
template = "home"
content_model = "overview"

[[ui.pages]]
slug = "distros"
title = "Linux Distros"
description = "Mirror pages for Parrot OS, antiX/MX and others."
template = "distro-grid"
content_model = "mirror:distro"

[[ui.pages]]
slug = "torrents"
title = "Torrents"
description = "Torrent metadata and payloads mirrored via APTlantis."
template = "torrent-grid"
content_model = "resources:torrents"

[[ui.pages]]
slug = "registries/rust-crates"
title = "Rust Crates Snapshots"
description = "crates.io snapshots and indexed metadata."
template = "registry"
content_model = "resources:snapshots"

[[ui.pages]]
slug = "templeos"
title = "TempleOS Archive"
description = "TempleOS videos, datasets, and metadata."
template = "templeos"
content_model = "resources:videos+datasets"

[[automation.rsync_jobs]]
target = "parrotos"
schedule = "0 */4 * * *"
source = "rsync://UPSTREAM/PARROTOS"
destination = "A:/Mirrors/ParrotOS"
flags = "-avz --delete"

[[automation.rsync_jobs]]
target = "antix-mx"
schedule = "30 */6 * * *"
source = "rsync://UPSTREAM/ANTIX-MX"
destination = "A:/Mirrors/antix-MX"
flags = "-avz --delete"

[[automation.rsync_jobs]]
target = "rust-crates"
schedule = "0 3 * * *"
source = "rsync://UPSTREAM/RUST-CRATES"
destination = "A:/Mirrors/Rust-Crates"
flags = "-avz --delete"

[[automation.rsync_jobs]]
target = "torrents"
schedule = "*/30 * * * *"
source = "rsync://UPSTREAM/TORRENTS"
destination = "A:/Mirrors/Torrents"
flags = "-avz"

[[automation.workers]]
id = "torrent-metadata-indexer"
type = "torrent-index"
image = "aptlantis/torrent-indexer:latest"
schedule = "*/15 * * * *"
config.watch_dir = "A:/Mirrors/Torrents"
config.metadata_root = "D:/Metadata/torrents"

[[automation.workers]]
id = "iso-hasher"
type = "iso-hasher"
image = "aptlantis/iso-hasher:latest"
schedule = "0 * * * *"
config.watch_dirs = ["A:/Mirrors/ParrotOS", "A:/Mirrors/antix-MX"]
config.output_metadata_root = "D:/Metadata/isos"

[[automation.pipelines]]
id = "crates-snapshot-pipeline"
description = "Generate, hash, and index crates.io snapshots."
stages = ["rsync:rust-crates", "snapshot:create", "hash:multi", "metadata:write", "index:update"]

[[llm.models]]
id = "local-minimax"
provider = "local"
model = "minimax-8b"
context_length = 8192
capabilities = ["summarize", "classify", "generate_metadata"]

[[llm.models]]
id = "cloud-openai-theme"
provider = "openai"
model = "gpt-4o-mini"
context_length = 16384
capabilities = ["generate_theme_tokens", "interpret_style_requests"]

[[assets.svg_library]]
id = "logo-aptlantis"
name = "APTlantis Primary Logo"
svg = "<svg><!-- logo here --></svg>"
metadata.role = "branding"
metadata.notes = "Primary logo used in navbar and footer."